{% extends "base.html" %}
{% block content %}
    <div class="container py-5">
        <div class="row">
            <div class="col-lg-8">
                <a href="{{ url_for('campaignlist') }}" class="btn btn-outline-secondary mb-4">← Back to Campaigns</a>
                <div class="card shadow-lg">
                    <div class="card-body p-5">
                        <!-- Donation Form -->
                        <div class="row">
                            <div class="col-lg-12">
                                <h4>Check Your Details</h4>
                                <form id="donationForm" method="post" >
                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Amount (₹)</label>
                                            
                                            <input type="text" class="form-control" id="donor_name" value="{{ client[3] }}" name="donor_name">
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Name</label>
                                            <input type="text" class="form-control" id="donor_name" value="{{ client[0] }}" name="donor_name">
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Email</label>
                                            <input type="email" class="form-control" id="donor_email" value="{{ client[1] }}" name="donor_email" required>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label">Phone</label>
                                            <input type="tel" class="form-control" id="donor_phone" value="{{ client[2] }}" name="donor_phone">
                                        </div>
                                    </div>
                                    <div id="customAmountField" style="display: none;" class="mb-3">
                                        <label class="form-label">Custom Amount (₹)</label>
                                        <input type="number" class="form-control" id="custom_amount" min="10">
                                    </div>
                                    <button id="donate_now" type="submit" class="btn btn-success  px-5">
                                        <i class="fas fa-credit-card me-2"></i> Donate Now
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h6 class="card-subtitle mb-3">Quick Donate</h6>
                        <div class="list-group list-group-flush">
                            <a href="#" class="list-group-item list-group-item-action" onclick="setAmount(100)">₹100</a>
                            <a href="#" class="list-group-item list-group-item-action" onclick="setAmount(500)">₹500</a>
                            <a href="#" class="list-group-item list-group-item-action" onclick="setAmount(1000)">₹1,000</a>
                            <a href="#" class="list-group-item list-group-item-action" onclick="setAmount(2500)">₹2,500</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
{% block scripts %}
    <script>
        function setAmount(amount) {
            document.getElementById('amount').value = amount;
            document.getElementById('donor_name').focus();
        }

        document.getElementById('amount').addEventListener('change', function() {
            if (this.value === 'custom') {
                document.getElementById('customAmountField').style.display = 'block';
            } else {
                document.getElementById('customAmountField').style.display = 'none';
            }
        });
    </script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://checkout.razorpay.com/v2/checkout.js"></script>

    <script>
        var options = {
            
            key: "rzp_test_SHy3zlzWZXNg3W",
            amount: "{{ order.amount }}",
            currency: "INR",
            name: "DonateKarma",
            description: "Donation Payment",
            order_id: "{{ order['id'] }}",
            handler: function (response) {
                var campaignid ='{{ campaignid }}';
                var form = document.createElement('form');
                form.method = 'POST';
                form.action = `/success_donation/${campaignid}`;
                form.innerHTML = `
                    <input type="hidden" name="razorpay_payment_id" value="${response.razorpay_payment_id}">
                    <input type="hidden" name="razorpay_order_id" value="${response.razorpay_order_id}">
                    <input type="hidden" name="razorpay_signature" value="${response.razorpay_signature}">
                    <input type="hidden" name="grand_total" value="{{ order.amount }}">
                `;
                document.body.appendChild(form);
                form.submit();
            },
            prefill: {
                name: "{{ client[0] }}",
                email: "{{ client[1] }}",
                contact: "{{ client[2] }}"
            },
            theme: {
                color: "#E1C59E"
            }
        };

        var rzp1 = new Razorpay(options);

        rzp1.on('payment.failed', function (response) {
            alert(response.error.description);
        });

        document.getElementById('donate_now').onclick = function(e){
            e.preventDefault();
            rzp1.open();
        };
        document.getElementById('donate_now').onclick = function(e){
            console.log('Amount:', {{ order.amount | int }});  // Must be number
            console.log('Order ID:', "{{ order.id }}");        // Must be order_ABC123
            e.preventDefault();
            rzp1.open();
        };
    </script>
{% endblock %}
