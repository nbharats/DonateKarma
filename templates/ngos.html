{% extends "adminbase.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3>NGOs Management</h3>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addNgoModal">+ Add NGO</button>
</div>

<!-- Add NGO Modal -->
<div class="modal fade" id="addNgoModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <form method="POST" action="{{ url_for('ngos') }}">
                <div class="modal-header">
                    <h5 class="modal-title">Add New NGO</h5>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" name="name" placeholder="Enter Name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Bank Account Number </label>
                        <input type="text" class="form-control" name="account" placeholder="Eg. xxxx-xxxx-xxxx" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" name="description" placeholder="About orgnization" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="table-responsive">
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th>Status</th>
                <th>Created</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for ngo in ngos %}
            <tr>
                <td> {{ ngo[0] }} </td>
                <td> {{ ngo[1] }} </td>
                <td> {{ ngo[2][:50] }} ...</td>
                <td>
                    <span class="badge bg-success"> {{ ngo[4] }} </span>
                </td>
                <td> {{ ngo[5].strftime('%d-%m-%Y') }} </td>
                <td>
                    <a href="{{ url_for('ngodelete',ngoid=ngo[0]) }}" class="btn btn-sm btn-danger" >Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
