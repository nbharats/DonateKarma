<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Rest Password</title>
    <link rel="stylesheet" href="{{ url_for('static',filename='css/form.css') }}">
</head>

<body>
    <main>
        <fieldset class="fs1">
            {% with messages=get_flashed_messages() %}
            {% if messages %}
                {% for i in messages %}
                    <p style="color: rgb(194, 174, 58); text-align: center;">{{ i }}</p>
                {% endfor %}
            {% endif %}
            {% endwith %}
            <div class="title">
                <h1>Reset Your Password</h1>
            </div>
            <form class="admin-resistration-form" method="post">
                <label for="password-label">New Password:</label>
                <input type="password" class="password" name="New_adminpassword" placeholder="Enter Password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" required>
                <label for="password-label">Confirm Password:</label>
                <input type="password" class="password" name="Confirm_adminpassword" placeholder="Enter Confirm Password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" required>
                <span class="Forget">
                    <a href="#" class="login"></a>
                </span>
                
                    <a href="#" class="Button"><button type="submit" class="btn">Reset Password</button></a>
                
                <div class="Login">
                    <p><a href="{{ url_for('adminlogin') }}" class="login">Login Now!</a></p>
                </div>
            </form>
        </fieldset>
    </main>
</body>
</html>
